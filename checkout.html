<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | ShopEase</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
font-family:'Poppins',sans-serif;
background:#000;
color:#fff;
padding:40px;
}

.logo{
font-family:'Playfair Display',serif;
font-size:32px;
margin-bottom:30px;
color:gold;
}

.checkout-container{
display:grid;
grid-template-columns:2fr 1fr;
gap:40px;
}

.form-box,.summary{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:none;
background:rgba(255,255,255,0.1);
color:#fff;
outline:none;
}

.pay-btn{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:25px;
background:gold;
cursor:pointer;
font-weight:bold;
}

.pay-btn:disabled{
opacity:0.5;
cursor:not-allowed;
}

#upiSection{display:none;margin-top:10px;}

#qrcode{
background:#fff;
display:inline-block;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<script>
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){
alert("Please login first");
window.location.href="login.html";
}
</script>

<div class="logo">ShopEase Checkout</div>

<div class="checkout-container">

<!-- FORM -->
<div class="form-box">

<h2>Shipping Details</h2>

<input type="text" id="name" placeholder="Full Name">
<br><br>

<input type="text" id="phone" placeholder="Phone Number">
<br><br>

<textarea id="address" placeholder="Address"></textarea>
<br><br>

<h3>Payment Method</h3>

<label><input type="radio" name="payment" value="UPI" checked> UPI</label><br>
<label><input type="radio" name="payment" value="COD"> COD</label>

<div id="upiSection">
<p>Scan to Pay</p>
<div id="qrcode"></div>
</div>

</div>

<!-- SUMMARY -->
<div class="summary">

<h2>Order Summary</h2>

<div id="items"></div>

<h3 id="total"></h3>

<button class="pay-btn" id="payBtn" onclick="placeOrder()" disabled>
Pay Now
</button>

</div>

</div>

<script>

/* UPI DETAILS */
const upiId = "7982069902@upi";
const merchant = "ShopEase";

/* AUTO FILL */
document.getElementById("name").value = currentUser.name;

/* CART */
function getCart(){
return JSON.parse(localStorage.getItem("cart")) || [];
}

/* CALCULATE */
function calculate(){

let cart = getCart();

if(cart.length === 0){
window.location.href = "cart.html";
}

let subtotal = 0;
let html = "";

cart.forEach(item=>{
subtotal += item.price * item.qty;
html += `<p>${item.name} x ${item.qty} = ₹${item.price * item.qty}</p>`;
});

let gst = subtotal * 0.05;
let total = subtotal + gst + 50;

document.getElementById("items").innerHTML = html;
document.getElementById("total").innerText = "Total: ₹" + total.toFixed(2);

generateQR(total.toFixed(2));
}

/* QR GENERATE */
function generateQR(amount){
let upiURL = `upi://pay?pa=${upiId}&pn=${merchant}&am=${amount}&cu=INR`;

document.getElementById("qrcode").innerHTML = "";

new QRCode(document.getElementById("qrcode"), {
text: upiURL,
width: 150,
height: 150
});
}

/* VALIDATION */
function validate(){
let name = document.getElementById("name").value.trim();
let phone = document.getElementById("phone").value.trim();
let address = document.getElementById("address").value.trim();

let phoneOk = /^[0-9]{10}$/.test(phone);

document.getElementById("payBtn").disabled =
!(name.length > 2 && phoneOk && address.length > 5);
}

document.querySelectorAll("input,textarea").forEach(el=>{
el.addEventListener("input", validate);
});

/* PAYMENT SWITCH */
document.querySelectorAll('input[name="payment"]').forEach(r=>{
r.addEventListener("change",()=>{
let method = document.querySelector('input[name="payment"]:checked').value;
document.getElementById("upiSection").style.display =
(method === "UPI") ? "block" : "none";
});
});

/* PLACE ORDER */
function placeOrder(){

let cart = getCart();

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let order = {
orderId: "ORD" + Date.now(),
user: currentUser,
items: cart,
total: document.getElementById("total").innerText,
status: "Pending",
payment: document.querySelector('input[name="payment"]:checked').value,
date: new Date().toLocaleString()
};

orders.push(order);

localStorage.setItem("orders", JSON.stringify(orders));
localStorage.removeItem("cart");

window.location.href = "success.html";
}

/* INIT */
calculate();
document.getElementById("upiSection").style.display = "block";
</script>

</body>
</html>
