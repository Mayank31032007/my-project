<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase | Premium Grocery Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
position:sticky;
top:0;
z-index:100;
flex-wrap:wrap;
}

.logo{
font-size:26px;
font-weight:700;
color:#ffd700;
}

.search-bar{
display:flex;
width:300px;
margin:10px 0;
}

.search-bar input{
flex:1;
padding:10px;
border:none;
border-radius:30px 0 0 30px;
outline:none;
}

.search-bar button{
padding:10px 20px;
border:none;
border-radius:0 30px 30px 0;
background:#ffd700;
font-weight:bold;
cursor:pointer;
}

.controls{
display:flex;
gap:10px;
}

select{
padding:8px;
border:none;
border-radius:10px;
}

.cart{
text-decoration:none;
color:white;
font-weight:600;
position:relative;
}

.cart span{
background:#ff4d4d;
padding:4px 8px;
border-radius:50%;
font-size:12px;
position:absolute;
top:-10px;
right:-15px;
}

/* HERO */
.hero{
height:60vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1542838132-92c53300491e') no-repeat center/cover;
position:relative;
}

.hero::after{
content:"";
position:absolute;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:0.9;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:60px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:20px;
padding:20px;
text-align:center;
transition:0.4s;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
position:relative;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
}

.badge{
position:absolute;
top:15px;
left:15px;
background:#ff4d4d;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.wish-btn{
position:absolute;
top:15px;
right:15px;
background:none;
border:none;
font-size:18px;
cursor:pointer;
color:white;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
margin-bottom:10px;
}

.card h3{
margin:10px 0;
}

.price{
color:#ffd700;
font-weight:700;
font-size:18px;
}

.qty{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:5px;
}

.qty button{
padding:5px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.card button.add{
margin-top:12px;
padding:10px 18px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ffd700,#ffb347);
font-weight:600;
cursor:pointer;
}

footer{
text-align:center;
padding:25px;
background:rgba(0,0,0,0.7);
margin-top:40px;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#ffd700;
color:black;
padding:10px 20px;
border-radius:10px;
z-index:999;
}

@media(max-width:768px){
header{flex-direction:column;gap:15px;}
.products{padding:30px;}
.hero h1{font-size:32px;}
}
</style>
</head>

<body>

<header>
<div class="logo">ShopEase</div>

<div class="search-bar">
<input type="text" id="search" placeholder="Search groceries...">
<button onclick="searchProduct()">Search</button>
</div>

<div class="controls">
<select id="category" onchange="filterCategory()">
<option value="all">All</option>
<option value="Grains">Grains</option>
<option value="Vegetables">Vegetables</option>
<option value="Dairy">Dairy</option>
<option value="Oils">Oils</option>
</select>

<select id="sort" onchange="sortProducts()">
<option value="default">Sort</option>
<option value="low">Low → High</option>
<option value="high">High → Low</option>
</select>
</div>

<a href="cart.html" class="cart">
Cart <span id="cart-count">0</span>
</a>
</header>

<section class="hero">
<div class="hero-content">
<h1> Grocery Experience</h1>
<p>Fresh • Organic • Delivered to Your Doorstep</p>
</div>
</section>

<section class="products" id="products"></section>

<footer>
© 2025 ShopEase | Developed by Harshit & Mayank Brother's
</footer>

const container=document.getElementById("products");

function displayProducts(list){
container.innerHTML="";
list.forEach(p=>{
container.innerHTML+=`
<div class="card">
<div class="badge">10% OFF</div>
<button class="wish-btn" onclick="addWishlist(${p.id})">🤍</button>
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">₹${p.price}</p>

<div class="qty">
<button onclick="changeQty(${p.id},-1)">-</button>
<span id="qty-${p.id}">1</span>
<button onclick="changeQty(${p.id},1)">+</button>
</div>

<button class="add" onclick="addToCart(${p.id})">Add to Cart</button>
</div>`;
});
}

function changeQty(id,val){
let el=document.getElementById("qty-"+id);
let qty=parseInt(el.innerText);
qty+=val;
if(qty<1) qty=1;
el.innerText=qty;
}

function getCart(){return JSON.parse(localStorage.getItem("cart"))||[];}
function setCart(cart){
localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
}

function addToCart(id){
let qty=parseInt(document.getElementById("qty-"+id).innerText);
let cart=getCart();
let item=cart.find(i=>i.id===id);

if(item){item.qty+=qty;}
else{
let product=products.find(p=>p.id===id);
cart.push({...product,qty});
}

setCart(cart);
showToast("Item Added!");
}

function addWishlist(id){
let wish=JSON.parse(localStorage.getItem("wish"))||[];
if(!wish.includes(id)) wish.push(id);
localStorage.setItem("wish",JSON.stringify(wish));
showToast("Added to Wishlist!");
}

function updateCartCount(){
let cart=getCart();
let total=cart.reduce((sum,i)=>sum+i.qty,0);
document.getElementById("cart-count").innerText=total;
}

function searchProduct(){
let value=document.getElementById("search").value.toLowerCase();
let filtered=products.filter(p=>p.name.toLowerCase().includes(value));
displayProducts(filtered);
}

function filterCategory(){
let value=document.getElementById("category").value;
if(value==="all") displayProducts(products);
else displayProducts(products.filter(p=>p.cat===value));
}

function sortProducts(){
let value=document.getElementById("sort").value;
let sorted=[...products];
if(value==="low") sorted.sort((a,b)=>a.price-b.price);
if(value==="high") sorted.sort((a,b)=>b.price-a.price);
displayProducts(sorted);
}

function showToast(msg){
let t=document.createElement("div");
t.className="toast";
t.innerText=msg;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

displayProducts(products);
updateCartCount();

</script>
