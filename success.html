<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful | ShopEase</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
color:white;
overflow:hidden;
flex-direction:column;
text-align:center;
}

/* Glow Circle */
.circle{
width:150px;
height:150px;
border-radius:50%;
background:radial-gradient(circle,#ffd700,#d4af37);
display:flex;
justify-content:center;
align-items:center;
animation:pulse 2s infinite;
box-shadow:0 0 40px gold;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.check{
font-size:60px;
color:black;
}

.title{
margin-top:30px;
font-size:36px;
font-family:'Playfair Display',serif;
background:linear-gradient(45deg,#d4af37,#ffd700,#fff8dc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
opacity:0;
animation:fadeText 1.5s forwards;
animation-delay:0.6s;
}

.subtitle{
margin-top:10px;
font-size:16px;
opacity:0;
animation:fadeText 1.5s forwards;
animation-delay:1s;
}

.order-box{
margin-top:25px;
background:rgba(255,255,255,0.05);
padding:20px 30px;
border-radius:15px;
opacity:0;
animation:fadeText 1.5s forwards;
animation-delay:1.4s;
}

.home-btn{
margin-top:25px;
padding:12px 25px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#d4af37,#ffd700);
color:black;
font-weight:600;
cursor:pointer;
transition:0.3s;
opacity:0;
animation:fadeText 1.5s forwards;
animation-delay:1.8s;
}

.home-btn:hover{
transform:scale(1.05);
}

@keyframes fadeText{
to{opacity:1;}
}

/* Confetti */
.confetti{
position:absolute;
width:8px;
height:8px;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
opacity:0;
}
}
</style>
</head>

<body>

<div class="circle">
<div class="check">✔</div>
</div>

<div class="title">Payment Successful</div>
<div class="subtitle">Your order has been confirmed</div>

<div class="order-box">
<p><strong>Order ID:</strong> <span id="orderId"></span></p>
<p><strong>Total Paid:</strong> <span id="paidAmount"></span></p>
<p><strong>Date:</strong> <span id="orderDate"></span></p>
</div>

<button class="home-btn" onclick="goHome()">Back to Home</button>

<script>

/* 🔐 LOGIN CHECK */
let currentUser = JSON.parse(localStorage.getItem("currentUser"));
if(!currentUser){
window.location.href="login.html";
}

/* 📦 Get Last Order */
let orders = JSON.parse(localStorage.getItem("orders")) || [];

if(orders.length === 0){
window.location.href="home.html";
}

/* Get last placed order */
let lastOrder = orders[orders.length - 1];

document.getElementById("orderId").innerText = lastOrder.orderId;
document.getElementById("paidAmount").innerText = lastOrder.total;
document.getElementById("orderDate").innerText = lastOrder.date;

/* 🎉 Confetti */
for(let i=0;i<60;i++){
let conf=document.createElement("div");
conf.classList.add("confetti");
conf.style.left=Math.random()*100+"vw";
conf.style.width="8px";
conf.style.height="8px";
conf.style.backgroundColor=Math.random()>0.5?"gold":"#d4af37";
conf.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(conf);
}

/* Auto redirect after 6 sec */
setTimeout(()=>{
window.location.href="home.html";
},6000);

function goHome(){
window.location.href="home.html";
}

</script>

</body>
</html>
