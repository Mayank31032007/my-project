<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Invoice | ShopEase</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.invoice{
background:white;
padding:30px;
max-width:800px;
margin:auto;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#333;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#222;
color:white;
}

.total{
text-align:right;
margin-top:20px;
font-size:18px;
}

button{
margin-top:20px;
padding:10px 20px;
background:black;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>
<body>

<div class="invoice">

<h1>ShopEase Invoice</h1>
<p>Date: <span id="date"></span></p>

<table>
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>
<tbody id="invoice-body"></tbody>
</table>

<div class="total">
<p>Subtotal: ₹<span id="subtotal"></span></p>
<p>GST (5%): ₹<span id="gst"></span></p>
<h3>Grand Total: ₹<span id="grand"></span></h3>
</div>

<button onclick="window.print()">Print Invoice</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let body = document.getElementById("invoice-body");
let subtotal = 0;

cart.forEach(item=>{
let total = item.price * item.qty;
subtotal += total;

body.innerHTML += `
<tr>
<td>${item.name}</td>
<td>₹${item.price}</td>
<td>${item.qty}</td>
<td>₹${total}</td>
</tr>`;
});

let gst = subtotal * 0.05;
let grand = subtotal + gst;

document.getElementById("subtotal").innerText = subtotal.toFixed(2);
document.getElementById("gst").innerText = gst.toFixed(2);
document.getElementById("grand").innerText = grand.toFixed(2);

document.getElementById("date").innerText = new Date().toLocaleDateString();

</script>

</body>
</html>
