<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin PRO MAX | ShopEase</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
font-family:Arial;
padding:40px;
}

h1{color:gold;}

.topbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

input,select{
padding:8px;
border-radius:5px;
border:none;
outline:none;
}

table{
width:100%;
border-collapse:collapse;
background:#111;
margin-top:20px;
}

th,td{
border:1px solid rgba(255,255,255,0.2);
padding:8px;
text-align:center;
}

th{background:#000;color:gold;}

button{
padding:5px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.delete{background:red;color:white;}
.wa{background:green;color:white;}

.badge{
padding:4px 8px;
border-radius:20px;
font-size:12px;
}

.Pending{background:orange;color:black;}
.Shipped{background:#00bfff;color:black;}
.Delivered{background:#00ff7f;color:black;}
.Cancelled{background:red;color:white;}

canvas{
background:#111;
padding:15px;
border-radius:10px;
margin-top:20px;
}
</style>
</head>

<body>

<h1>ShopEase ADMIN PRO MAX</h1>

<div class="topbar">
<input type="text" id="search" placeholder="Search order/user/email">

<select id="filter">
<option value="All">All</option>
<option value="Pending">Pending</option>
<option value="Shipped">Shipped</option>
<option value="Delivered">Delivered</option>
<option value="Cancelled">Cancelled</option>
</select>
</div>

<canvas id="chart" height="120"></canvas>

<div id="container"></div>

<script>

if(localStorage.getItem("adminLoggedIn") !== "true"){
window.location.href="admin-login.html";
}

/* SAFE TOTAL CALC */
function calc(o){
let subtotal = 0;

(o.items || []).forEach(i=>{
subtotal += Number(i.price || 0) * Number(i.qty || 0);
});

let gst = subtotal * 0.05;
let delivery = 50;

return {
subtotal,
gst,
delivery,
total: subtotal + gst + delivery
};
}

/* GET ORDERS */
function getOrders(){
return JSON.parse(localStorage.getItem("orders")) || [];
}

/* MONEY FORMAT */
function money(n){
return "₹" + Number(n || 0).toFixed(2);
}

/* CHART */
function loadChart(){
let orders = getOrders();

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:orders.map((o,i)=>"Order "+(i+1)),
datasets:[{
label:"Revenue",
data:orders.map(o=>calc(o).total),
borderColor:"gold"
}]
}
});
}

/* RENDER TABLE */
function render(){

let orders = getOrders();

let search = document.getElementById("search").value.toLowerCase();
let filter = document.getElementById("filter").value;

orders = orders.filter(o=>{
return (
(o.name||"").toLowerCase().includes(search) ||
(o.email||"").toLowerCase().includes(search) ||
(o.orderId||"").toLowerCase().includes(search)
) && (filter==="All" || o.status===filter);
});

let html = `<table>
<tr>
<th>ID</th>
<th>User</th>
<th>Total</th>
<th>Status</th>
<th>Actions</th>
</tr>`;

orders.forEach((o,i)=>{

let t = calc(o).total;

html += `
<tr>
<td>${o.orderId}</td>
<td>${o.name}</td>
<td>${money(t)}</td>
<td><span class="badge ${o.status}">${o.status}</span></td>
<td>
<button class="wa" onclick="whatsapp(${i})">WhatsApp</button>
<button class="delete" onclick="del(${i})">X</button>
</td>
</tr>`;
});

html += `</table>`;
document.getElementById("container").innerHTML = html;

loadChart();
}

/* DELETE */
function del(i){
let o = getOrders();
o.splice(i,1);
localStorage.setItem("orders",JSON.stringify(o));
render();
}

/* WHATSAPP ONLY */
function whatsapp(i){

let o = getOrders()[i];
let c = calc(o);

let msg =
`🛒 ShopEase Order
Order ID: ${o.orderId}
Name: ${o.name}
Total: ${money(c.total)}`;

window.open("https://wa.me/?text=" + encodeURIComponent(msg));
}

/* INIT */
render();

</script>

</body>
</html>
