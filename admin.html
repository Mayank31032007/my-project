<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel | ShopEase</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
font-family:Arial;
padding:40px;
}

h1{color:gold;}

.dashboard{
display:flex;
gap:20px;
margin-bottom:30px;
flex-wrap:wrap;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
flex:1;
min-width:200px;
text-align:center;
}

canvas{
background:#111;
padding:20px;
border-radius:10px;
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:30px;
background:#111;
}

th,td{
border:1px solid rgba(255,255,255,0.2);
padding:8px;
text-align:center;
}

th{
background:#000;
color:gold;
}

select{
padding:5px;
}

button{
padding:5px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.delete-btn{background:red;color:white;}
.logout{background:gold;color:black;margin-bottom:20px;}
a{color:#ffd700;cursor:pointer;text-decoration:none;}
a:hover{text-decoration:underline;}

.status-badge{
padding:4px 8px;
border-radius:20px;
font-size:12px;
}

.Pending{background:orange;color:black;}
.Shipped{background:#00bfff;color:black;}
.Delivered{background:#00ff7f;color:black;}
.Cancelled{background:red;color:white;}

/* Modal */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:20px;
border-radius:10px;
width:300px;
}
</style>
</head>

<body>

<button class="logout" onclick="logout()">Logout</button>

<h1>ShopEase Admin Panel</h1>

<div class="dashboard">
<div class="card">
<h3>Total Orders</h3>
<p id="totalOrders">0</p>
</div>

<div class="card">
<h3>Total Revenue</h3>
<p id="totalRevenue">₹0</p>
</div>

<div class="card">
<h3>Total Users</h3>
<p id="totalUsers">0</p>
</div>

<div class="card">
<h3>Cancelled Orders</h3>
<p id="cancelledOrders">0</p>
</div>
</div>

<h2>Orders Overview</h2>
<canvas id="statusChart"></canvas>

<h2>Daily Orders</h2>
<canvas id="dailyChart"></canvas>

<h2>Revenue Growth</h2>
<canvas id="revenueChart"></canvas>

<div id="ordersContainer"></div>

<!-- USER MODAL -->
<div class="modal" id="userModal">
<div class="modal-content">
<h3>User Details</h3>
<p id="userDetails"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

/* 🔐 Protect */
if(localStorage.getItem("adminLoggedIn")!=="true"){
window.location.href="admin-login.html";
}

function logout(){
localStorage.removeItem("adminLoggedIn");
window.location.href="admin-login.html";
}

function getOrders(){ return JSON.parse(localStorage.getItem("orders"))||[]; }
function getUsers(){ return JSON.parse(localStorage.getItem("users"))||[]; }

let statusChart,dailyChart,revenueChart;

function renderOrders(){

let orders=getOrders();
let users=getUsers();

document.getElementById("totalOrders").innerText=orders.length;
document.getElementById("totalUsers").innerText=users.length;

/* Sort latest first */
orders.sort((a,b)=> new Date(b.date) - new Date(a.date));

let revenue=0;
let cancelledCount=0;
let statusCount={Pending:0,Shipped:0,Delivered:0,Cancelled:0};
let dailyData={};
let revenueData=[];

orders.forEach(o=>{

let amount=parseFloat(o.total?.replace("₹",""))||0;

if(o.status!=="Cancelled"){
revenue+=amount;
revenueData.push(amount);
}else{
cancelledCount++;
}

if(!o.status) o.status="Pending";
statusCount[o.status]++;

let date=o.date ? new Date(o.date).toLocaleDateString() : "Unknown";
if(!dailyData[date]) dailyData[date]=0;
dailyData[date]++;
});

document.getElementById("totalRevenue").innerText="₹"+revenue.toFixed(2);
document.getElementById("cancelledOrders").innerText=cancelledCount;

/* Destroy charts */
if(statusChart) statusChart.destroy();
if(dailyChart) dailyChart.destroy();
if(revenueChart) revenueChart.destroy();

/* Status Chart */
statusChart=new Chart(document.getElementById("statusChart"),{
type:"pie",
data:{labels:Object.keys(statusCount),
datasets:[{data:Object.values(statusCount)}]}
});

/* Daily Orders */
dailyChart=new Chart(document.getElementById("dailyChart"),{
type:"bar",
data:{labels:Object.keys(dailyData),
datasets:[{label:"Orders",data:Object.values(dailyData)}]}
});

/* Revenue Chart */
revenueChart=new Chart(document.getElementById("revenueChart"),{
type:"line",
data:{labels:orders.map((o,i)=>"Order "+(i+1)),
datasets:[{label:"Revenue ₹",data:revenueData}]}
});

let container=document.getElementById("ordersContainer");

if(orders.length===0){
container.innerHTML="<h3>No Orders Found</h3>";
return;
}

let html=`<table>
<tr>
<th>Order ID</th>
<th>User</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>
</tr>`;

orders.forEach((order,index)=>{
html+=`
<tr>
<td>${order.orderId}</td>
<td><a onclick="viewUser('${order.userId}')">${order.name}</a></td>
<td>${order.total}</td>
<td><span class="status-badge ${order.status}">${order.status}</span></td>
<td>
<select onchange="updateStatus(${index},this.value)">
<option ${order.status==="Pending"?"selected":""}>Pending</option>
<option ${order.status==="Shipped"?"selected":""}>Shipped</option>
<option ${order.status==="Delivered"?"selected":""}>Delivered</option>
<option ${order.status==="Cancelled"?"selected":""}>Cancelled</option>
</select>
<button class="delete-btn" onclick="deleteOrder(${index})">Delete</button>
</td>
</tr>`;
});

html+="</table>";
container.innerHTML=html;

localStorage.setItem("orders",JSON.stringify(orders));
}

/* 👤 View User Modal */
function viewUser(userId){
let users=getUsers();
let user=users.find(u=>u.userId===userId);

if(!user) return;

let userOrders=getOrders().filter(o=>o.userId===userId);

document.getElementById("userDetails").innerHTML=
"Name: "+user.name+"<br>"+
"Email: "+user.email+"<br>"+
"User ID: "+user.userId+"<br>"+
"Total Orders: "+userOrders.length;

document.getElementById("userModal").style.display="flex";
}

function closeModal(){
document.getElementById("userModal").style.display="none";
}

function updateStatus(index,value){
let orders=getOrders();
orders[index].status=value;
localStorage.setItem("orders",JSON.stringify(orders));
renderOrders();
}

function deleteOrder(index){
let orders=getOrders();
orders.splice(index,1);
localStorage.setItem("orders",JSON.stringify(orders));
renderOrders();
}

/* Auto Refresh */
window.addEventListener("storage",e=>{
if(e.key==="orders") renderOrders();
});

renderOrders();

</script>

</body>
</html>
