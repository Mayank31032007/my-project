<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shop Ease </title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at center,#111,#000);
overflow:hidden;
font-family:'Cinzel',serif;
}

/* Animated luxury background glow */
body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,rgba(255,215,0,0.25),transparent 70%);
filter:blur(120px);
animation:glowMove 6s infinite alternate ease-in-out;
}

@keyframes glowMove{
0%{transform:translate(-50px,-50px);}
100%{transform:translate(50px,50px);}
}

/* Logo container */
.logo-container{
position:relative;
text-align:center;
}

/* Luxury Logo Text */
.logo{
font-size:90px;
letter-spacing:10px;
color:gold;
position:relative;
opacity:0;
transform:scale(0.8);
animation:logoFade 3s forwards ease-in-out;
}

/* Golden Light Sweep */
.logo::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.8),transparent);
transform:skewX(-20deg);
animation:shine 3s 1.5s forwards;
}

@keyframes shine{
100%{left:200%;}
}

/* Logo Fade Animation */
@keyframes logoFade{
to{
opacity:1;
transform:scale(1.05);
}
}

/* Tagline */
.tagline{
margin-top:20px;
font-size:18px;
letter-spacing:6px;
color:#d4af37;
opacity:0;
animation:tagFade 2s 2s forwards;
}

@keyframes tagFade{
to{opacity:1;}
}

/* Fade Out Effect */
.fade-out{
animation:fadeOut 1.5s forwards;
}

@keyframes fadeOut{
to{opacity:0;transform:scale(1.1);}
}
</style>
</head>

<body>

<div class="logo-container" id="intro">
<div class="logo">SHOP EASE</div>
<div class="tagline">ELEGANCE IN EVERY PURCHASE</div>
</div>

<script>

/* After 5 seconds → Fade out → Go to login */

setTimeout(function(){
document.getElementById("intro").classList.add("fade-out");
},4500);

setTimeout(function(){
window.location.href="login.html";
},6000);

</script>

</body>
</html>
