<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart | ShopEase</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
flex-wrap:wrap;
}

.logo{
font-family:'Playfair Display',serif;
font-size:32px;
color:gold;
}

a{
color:gold;
text-decoration:none;
}

.cart-container{
display:grid;
grid-template-columns:2fr 1fr;
gap:40px;
}

.cart-card{
display:flex;
gap:20px;
padding:20px;
background:rgba(255,255,255,0.05);
border-radius:15px;
}

.cart-card img{
width:80px;
height:80px;
border-radius:10px;
}

.price{
color:gold;
font-weight:bold;
}

.qty button{
padding:5px 10px;
background:gold;
border:none;
cursor:pointer;
}

.remove{
color:red;
cursor:pointer;
margin-top:5px;
}

.summary{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:15px;
}

.total{
font-size:20px;
color:gold;
font-weight:bold;
}

.btn{
width:100%;
padding:10px;
margin-top:10px;
border:none;
cursor:pointer;
border-radius:10px;
}

.pay-btn{background:green;color:white;}
.invoice-btn{background:gold;}
.clear-btn{background:red;color:white;}

.empty{
text-align:center;
opacity:0.7;
}
</style>
</head>

<body>

<script>
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){
alert("Please login first");
window.location.href="login.html";
}
</script>

<div class="header">
<div class="logo">ShopEase Cart</div>
<a href="home.html">Continue Shopping</a>
</div>

<div class="cart-container">

<div id="cart-items"></div>

<div class="summary">

<h2>Summary</h2>

<p>Items: <span id="itemCount">0</span></p>
<p>Subtotal: <span id="subtotal">₹0</span></p>
<p>GST: <span id="gst">₹0</span></p>
<p>Delivery: ₹50</p>

<hr>

<p class="total">Total: <span id="total">₹0</span></p>

<button class="btn invoice-btn" onclick="generateInvoice()">Generate Invoice</button>
<button class="btn pay-btn" onclick="payNow()">Pay Now</button>
<button class="btn clear-btn" onclick="clearCart()">Clear Cart</button>

</div>

</div>

<script>

/* GET CART */
function getCart(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
return Array.isArray(cart) ? cart : [];
}

/* SAVE CART */
function setCart(cart){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

/* RENDER CART */
function renderCart(){

let cart = getCart();
let box = document.getElementById("cart-items");

let subtotal = 0;
let items = 0;

box.innerHTML = "";

if(cart.length === 0){
box.innerHTML = `<div class="empty">Your cart is empty 🛒</div>`;
updateSummary(0,0);
return;
}

cart.forEach(item=>{
subtotal += item.price * item.qty;
items += item.qty;

box.innerHTML += `
<div class="cart-card">
<img src="${item.img}">
<div>
<h3>${item.name}</h3>
<p class="price">₹${item.price}</p>

<div class="qty">
<button onclick="changeQty(${item.id},-1)">-</button>
<span>${item.qty}</span>
<button onclick="changeQty(${item.id},1)">+</button>
</div>

<div class="remove" onclick="removeItem(${item.id})">Remove</div>

</div>
</div>
`;
});

updateSummary(subtotal,items);
}

/* SUMMARY */
function updateSummary(subtotal,items){

let gst = subtotal * 0.05;
let total = subtotal + gst + 50;

document.getElementById("itemCount").innerText = items;
document.getElementById("subtotal").innerText = "₹" + subtotal.toFixed(2);
document.getElementById("gst").innerText = "₹" + gst.toFixed(2);
document.getElementById("total").innerText = "₹" + total.toFixed(2);
}

/* QTY CHANGE */
function changeQty(id,val){

let cart = getCart();
let item = cart.find(i=>i.id===id);

if(item){
item.qty += val;

if(item.qty <= 0){
cart = cart.filter(i=>i.id !== id);
}
}

setCart(cart);
}

/* REMOVE */
function removeItem(id){
let cart = getCart().filter(i=>i.id !== id);
setCart(cart);
}

/* CLEAR */
function clearCart(){
localStorage.removeItem("cart");
renderCart();
}

/* INVOICE */
function generateInvoice(){

let cart = getCart();

if(cart.length === 0){
alert("Cart empty");
return;
}

let invoice = {
invoiceNo: "INV" + Date.now(),
user: currentUser,
items: cart,
date: new Date().toLocaleString(),
status: "PENDING"
};

localStorage.setItem("invoiceData",JSON.stringify(invoice));
window.location.href = "invoice.html";
}

/* PAY NOW */
function payNow(){

let cart = getCart();

if(cart.length === 0){
alert("Cart empty");
return;
}

/* ⭐ IMPORTANT FIX: proper user object pass */
localStorage.setItem("checkoutData",JSON.stringify({
user: currentUser,
items: cart
}));

window.location.href = "checkout.html";
}

/* INIT */
renderCart();

</script>

</body>
</html>
