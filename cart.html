<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart | ShopEase</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
flex-wrap:wrap;
gap:10px;
}

.logo{
font-family:'Playfair Display',serif;
font-size:32px;
background:linear-gradient(45deg,#d4af37,#ffd700,#fff8dc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header a{
color:gold;
text-decoration:none;
}

.cart-container{
display:grid;
grid-template-columns:2fr 1fr;
gap:40px;
}

.cart-items{
display:flex;
flex-direction:column;
gap:20px;
}

.cart-card{
display:flex;
align-items:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:20px;
border-radius:15px;
gap:20px;
}

.cart-card img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#ffd700;
font-weight:600;
}

.qty{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.qty button{
padding:5px 10px;
border:none;
background:#d4af37;
color:black;
border-radius:5px;
cursor:pointer;
}

.remove{
color:#ff4d4d;
cursor:pointer;
font-size:14px;
margin-top:5px;
}

.empty{
text-align:center;
opacity:0.6;
font-size:18px;
margin-top:40px;
}

.summary{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
height:fit-content;
}

.summary h2{
font-family:'Playfair Display',serif;
margin-bottom:20px;
}

.summary-row{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.total{
font-size:20px;
font-weight:700;
color:#ffd700;
margin-top:15px;
}

.btn{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:30px;
font-weight:600;
cursor:pointer;
}

.invoice-btn{
background:linear-gradient(45deg,#d4af37,#ffd700);
color:black;
}

.pay-btn{
background:linear-gradient(45deg,#00c853,#69f0ae);
color:black;
}

.clear-btn{
margin-top:10px;
background:red;
color:white;
width:100%;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
}

@media(max-width:900px){
.cart-container{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<script>
let currentUser = JSON.parse(localStorage.getItem("currentUser"));
if(!currentUser){
window.location.href="login.html";
}
</script>

<div class="header">
<div class="logo">ShopEase Cart</div>
<a href="home.html">← Continue Shopping</a>
</div>

<div class="cart-container">

<div class="cart-items" id="cart-items"></div>

<div class="summary">
<h2>Order Summary</h2>

<div class="summary-row">
<span>Items</span>
<span id="itemCount">0</span>
</div>

<div class="summary-row">
<span>Subtotal</span>
<span id="subtotal">₹0</span>
</div>

<div class="summary-row">
<span>GST (5%)</span>
<span id="gst">₹0</span>
</div>

<div class="summary-row">
<span>Delivery</span>
<span>₹50</span>
</div>

<hr style="margin:15px 0;border-color:rgba(255,255,255,0.2);">

<div class="summary-row total">
<span>Total</span>
<span id="total">₹0</span>
</div>

<button class="btn invoice-btn" onclick="generateInvoice()">
Generate Invoice
</button>

<button class="btn pay-btn" onclick="payNow()">
Pay Now
</button>

<button class="clear-btn" onclick="clearCart()">Clear Cart</button>

</div>
</div>

<script>

function getCart(){
return JSON.parse(localStorage.getItem("cart"))||[];
}

function setCart(cart){
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function renderCart(){
let cart=getCart();
let container=document.getElementById("cart-items");

container.innerHTML="";
let subtotal=0;
let totalItems=0;

if(cart.length===0){
container.innerHTML=`<div class="empty">Your cart is empty 🛒</div>`;
updateSummary(0,0,50);
return;
}

cart.forEach(item=>{
subtotal+=item.price*item.qty;
totalItems+=item.qty;

container.innerHTML+=`
<div class="cart-card">
<img src="${item.img}">
<div>
<h3>${item.name}</h3>
<div class="price">₹${item.price}</div>
<div class="qty">
<button onclick="changeQty(${item.id},-1)">-</button>
<span>${item.qty}</span>
<button onclick="changeQty(${item.id},1)">+</button>
</div>
<div class="remove" onclick="removeItem(${item.id})">Remove</div>
</div>
</div>`;
});

updateSummary(subtotal,totalItems,50);
}

function updateSummary(subtotal,totalItems,delivery){
let gst=subtotal*0.05;
let total=subtotal+gst+delivery;

document.getElementById("itemCount").innerText=totalItems;
document.getElementById("subtotal").innerText="₹"+subtotal.toFixed(2);
document.getElementById("gst").innerText="₹"+gst.toFixed(2);
document.getElementById("total").innerText="₹"+total.toFixed(2);
}

function changeQty(id,val){
let cart=getCart();
let item=cart.find(i=>i.id===id);
if(item){
item.qty+=val;
if(item.qty<=0){
cart=cart.filter(i=>i.id!==id);
}
}
setCart(cart);
}

function removeItem(id){
let cart=getCart().filter(i=>i.id!==id);
setCart(cart);
}

function clearCart(){
localStorage.removeItem("cart");
renderCart();
}

/* GENERATE INVOICE (Pending) */
function generateInvoice(){

let cart=getCart();
if(cart.length===0){
alert("Cart is empty!");
return;
}

let invoiceData={
invoiceNo:"INV-"+Math.floor(Math.random()*100000),
date:new Date().toLocaleString(),
customer:JSON.parse(localStorage.getItem("currentUser"))?.email || "Guest",
items:cart,
delivery:50,
paymentStatus:"PENDING"
};

localStorage.setItem("invoiceData",JSON.stringify(invoiceData));
window.location.href="invoice.html";
}

/* PAY NOW (Paid + Clear Cart) */
function payNow(){

let cart=getCart();

if(cart.length===0){
alert("Cart is empty!");
return;
}

/* Save temporary checkout data */
let checkoutData={
customer:JSON.parse(localStorage.getItem("currentUser"))?.email || "Guest",
items:cart,
delivery:50
};

localStorage.setItem("checkoutData",JSON.stringify(checkoutData));

/* Redirect to checkout page */
window.location.href="checkout.html";
}

renderCart();

</script>

</body>
</html>
